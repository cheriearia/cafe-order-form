<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Café Myrtille</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="header">
            <img src="images/coffee-cup.jpg" id="berry" alt="Coffee Cup Logo" height="210" width="210">
            <h1>Café Myrtille</h1>
        </div>

        <div class="navbar">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Menu</a></li>
                <li><a href="input.html">Order Ahead</a></li>
                <li><a href="report.html">Reports</a></li>
                <li><a href="">Settings</a></li>
            </ul>
        </div>

        <div class="content">
            <h1>Order Ahead</h1>
            <div class="forms">
                <form id="contactinfo">
                    <h2>Contact Information</h2>
                    <input type="text" id="fname" name="fname" placeholder="First Name*"><br>
                    <input type="text" id="lname" name="lname" placeholder="Last Name*"><br>
                    <input type="email" id="uemail" name="uemail" placeholder="Email*"><br>
                    <input type="tel" id="phonenum" name="phonenum" placeholder="Phone Number*">
                
                    <h2>Schedule Order</h2>
                </form>

                <form id="payment">
                    <h2>Choose Payment Method</h2>
                    <input type="radio" id="applepay" name="paymethod" value="ApplePay">
                    <label for="applepay">Apple Pay</label><br>
                    <input type="radio" id="card" name="card" value="Card">
                    <label for="card">Debit or Credit Card</label><br>
                    <input type="radio" id="cash" name="cash" value="Cash">
                    <label for="cash">Cash</label><br>
                    <input type="radio" id="paypal" name="paypal" value="PayPal">
                    <label for="paypal">PayPal</label><br>
                    <input type="radio" id="venmo" name="venmo" value="Venmo">
                    <label for="venmo">Venmo</label><br>
                    <input type="radio" id="cashapp" name="cashapp" value="Cashapp">
                    <label for="cashapp">Cashapp</label>

                    <h2>Rewards & Promos</h2>
                </form>
            </div>
            <h2>Notes</h2>
        </div>

        <div class="footer">
            <ul>
                <li><p>&copy 2026 Café Myrtille</p></li>
                <li><a href="">Privacy Policy</a></li>
                <li><a href="">Terms of Service</a></li>
                <li><a href="">Contact Us</a></li>
            </ul>
        </div>
    </body>
</html>
